# Phase 7 / US5 — Accessibility / VoiceOver navigation smoke
# (001-wolof-translate-mobile:T113) assumes VoiceOver is enabled at device
# level before running this flow — Maestro cannot toggle VoiceOver itself.
#
# Validates FR-025: every interactive surface carries an accessibilityLabel
# and VoiceOver can navigate Main → Settings → Main → DevPanel → Main.
# Flow:
#  1. Launch app → assert the Main-screen header label is announced.
#  2. Tap the gear icon → SettingsSheet is visible and labeled.
#  3. Back → Main-screen restored.
#  4. Tap the wrench icon → DevPanelSheet is visible and labeled.
#  5. Back → Main-screen restored.
#  6. If the English-to-Wolof DirectionButton is visible, assert its label.
appId: com.cryingaffrica.wolofTranslate
name: US5 — VoiceOver navigation + labels
tags:
  - us5
  - a11y
---
- launchApp:
    clearState: true
- assertVisible: "Wolof Translate"
- assertVisible: "English → Wolof"

# Step 2 — Settings sheet is reachable and has a root a11y label.
- tapOn:
    id: "MainScreen.settingsButton"
- assertVisible:
    id: "SettingsSheet"
    timeout: 3000
- assertVisible: "Settings"
- assertVisible: "Tap mode"

# Step 3 — Back to Main.
- back
- assertVisible: "Wolof Translate"

# Step 4 — Dev panel sheet with its own a11y label.
- tapOn:
    id: "MainScreen.devPanelButton"
- assertVisible:
    id: "DevPanelSheet"
    timeout: 3000
- assertVisible: "Developer mode"

# Step 5 — Back to Main.
- back
- assertVisible: "Wolof Translate"

# Step 6 — DirectionButton on Main is labeled for VoiceOver. The label is
# derived from direction title ("English → Wolof translate button"); the
# visible text is sufficient to assert accessibility via Maestro because the
# accessibilityLabel falls back to visible text in the a11y tree.
- assertVisible: "English → Wolof"
- assertVisible: "Wolof → English"
