# Phase 6 / US3 — Developer-mode diagnostic panel end-to-end
# (001-wolof-translate-mobile:T097)
#
# Validates FR-014 (gated visibility), FR-015e (runtime backend URL override),
# FR-016 (persistence across cold relaunch), and FR-022 (bff-client reads the
# override on every request).
#
# Flow:
#  1. Open dev panel → enable dev mode → gated panels appear.
#  2. Change the backend URL override to a test value.
#  3. Trigger an upload → the request goes to the new URL (asserted via the
#     raw-response / event-log surfaces, which reflect the new base URL).
#  4. Toggle dev mode off → gated panels hidden.
#  5. Kill & relaunch → dev-mode toggle state is preserved.
appId: com.cryingaffrica.wolofTranslate
name: US3 — Developer-mode diagnostic panel
tags:
  - us3
  - dev-panel
---
- launchApp:
    clearState: true
- assertVisible: "Wolof Translate"

# Step 1 — Open the dev panel via the wrench icon on the main screen.
- tapOn:
    id: "MainScreen.devPanelButton"
- assertVisible:
    id: "DevPanelSheet"
    timeout: 3000

# Step 1 cont'd — enable dev mode. Gated panels (URL editor, raw response,
# event log, preview, file picker) become visible.
- tapOn:
    id: "DevPanelSheet.devModeSwitch"
- assertVisible:
    id: "DevPanelSheet.backendUrlInput"
    timeout: 2000
- assertVisible:
    id: "DevPanelSheet.filePickerTrigger"
- assertVisible:
    id: "DevPanelSheet.eventLogList"

# Step 2 — Change the backend URL override. Input validates with new URL()
# so the visibly-http-prefixed value must Save successfully.
- tapOn:
    id: "DevPanelSheet.backendUrlInput"
- eraseText
- inputText: "https://bff.staging.example.com"
- tapOn:
    id: "DevPanelSheet.backendUrlSave"
# No inline error expected for a valid URL.
- assertNotVisible:
    id: "DevPanelSheet.backendUrlError"

# Step 3 — Close the dev panel, trigger a recording, and verify the request
# surface reflects the new base URL. The event log records one `bff-client`
# entry per request; we assert its presence from the dev panel after the
# recording completes (or fails, which is fine — the URL is the thing under
# test, not the backend's response).
- back
- assertVisible: "English → Wolof"
- longPressOn:
    text: "English → Wolof"
    duration: 3000

# Give the pipeline a moment to either complete or fail — either terminal
# state surfaces an event in the log, which we then inspect.
- waitForAnimationToEnd:
    timeout: 8000

- tapOn:
    id: "MainScreen.devPanelButton"
- assertVisible:
    id: "DevPanelSheet.eventLogList"
# Scope the URL-substring assertion to the backendUrlInput field so we verify
# the override is still bound to the input (not just printed elsewhere in the
# panel). True FR-022 enforcement — that the HTTP request actually went to the
# new host — is verified by src/api/__tests__/ unit tests, not by Maestro.
# (001-wolof-translate-mobile:T097)
- assertVisible:
    id: "DevPanelSheet.backendUrlInput"
    text: "bff.staging.example.com"
    timeout: 4000

# Step 4 — Toggle dev mode off; gated panels hide but the Switch remains.
- tapOn:
    id: "DevPanelSheet.devModeSwitch"
- assertVisible:
    id: "DevPanelSheet.devModeSwitch"
- assertNotVisible:
    id: "DevPanelSheet.backendUrlInput"
- assertNotVisible:
    id: "DevPanelSheet.filePickerTrigger"
- assertNotVisible:
    id: "DevPanelSheet.eventLogList"

# Re-enable so the persistence check in step 5 has something to verify.
- tapOn:
    id: "DevPanelSheet.devModeSwitch"
- assertVisible:
    id: "DevPanelSheet.backendUrlInput"

# Step 5 — Cold relaunch. clearState is intentionally NOT used here: we need
# AsyncStorage preserved so FR-016 persistence can be verified.
- killApp
- launchApp
- assertVisible: "Wolof Translate"
- tapOn:
    id: "MainScreen.devPanelButton"
- assertVisible:
    id: "DevPanelSheet"
    timeout: 3000
# Dev-mode toggle state persisted across the relaunch → gated panels render.
- assertVisible:
    id: "DevPanelSheet.backendUrlInput"
    timeout: 3000
- assertVisible:
    id: "DevPanelSheet.filePickerTrigger"
